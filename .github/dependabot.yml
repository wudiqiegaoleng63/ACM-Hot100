version: 2
updates:
  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
      day: monday
      time: '04:00'
      timezone: UTC
    open-pull-requests-limit: 5
    groups:
      web-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: gomod
    directory: /apps/server
    schedule:
      interval: weekly
      day: monday
      time: '04:20'
      timezone: UTC
    open-pull-requests-limit: 5
    groups:
      go-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '04:40'
      timezone: UTC
    open-pull-requests-limit: 3
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
