name: Container images

on:
  pull_request:
    branches:
      - main
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: Exact release version (for example v1.2.3)
        required: true
        type: string

permissions: {}

concurrency:
  group: images-${{ github.event_name == 'pull_request' && github.ref || inputs.version || github.ref_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build ${{ matrix.component }} image
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: web
            image: acmhot100-web
            dockerfile: apps/web/Dockerfile
          - component: server
            image: acmhot100-server
            dockerfile: apps/server/Dockerfile
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build without publishing
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: false
          provenance: false
          sbom: false
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}

  prepare:
    name: Validate release version
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Validate semantic version and source ref
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_VERSION: ${{ inputs.version }}
          RELEASE_REF: ${{ github.ref }}
          RELEASE_REF_NAME: ${{ github.ref_name }}
        run: |
          set -Eeuo pipefail
          readonly SEMVER_PATTERN='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$'

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            if [[ "$RELEASE_REF" != "refs/heads/main" ]]; then
              echo 'Manual image publication is allowed only from main.' >&2
              exit 1
            fi
            release_version="$MANUAL_VERSION"
          else
            if [[ "$RELEASE_REF" != refs/tags/* ]]; then
              echo 'Automatic image publication requires a version tag.' >&2
              exit 1
            fi
            release_version="$RELEASE_REF_NAME"
            git fetch --no-tags origin main
            if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
              echo 'Version tags must point to a commit contained in main.' >&2
              exit 1
            fi
          fi

          if [[ ! "$release_version" =~ $SEMVER_PATTERN ]]; then
            echo 'Version must be an exact stable semantic version such as v1.2.3.' >&2
            exit 1
          fi

          echo "version=${release_version#v}" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish ${{ matrix.component }} image
    needs: prepare
    if: ${{ needs.prepare.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: web
            image: acmhot100-web
            dockerfile: apps/web/Dockerfile
          - component: server
            image: acmhot100-server
            dockerfile: apps/server/Dockerfile
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Refuse existing immutable tags
        id: preflight
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -Eeuo pipefail
          version_ref="${IMAGE_NAME}:${RELEASE_VERSION}"
          sha_ref="${IMAGE_NAME}:sha-${GITHUB_SHA}"
          version_digest=''
          sha_digest=''

          for ref_name in version sha; do
            if [[ "$ref_name" == 'version' ]]; then
              image_ref="$version_ref"
            else
              image_ref="$sha_ref"
            fi
            if digest="$(docker buildx imagetools inspect "$image_ref" --format '{{.Manifest.Digest}}' 2>/tmp/inspect-error)"; then
              printf -v "${ref_name}_digest" '%s' "$digest"
              continue
            fi
            output="$(</tmp/inspect-error)"
            if ! grep -Eqi 'manifest unknown|not found' <<<"$output"; then
              echo "Unable to inspect $image_ref; refusing to publish." >&2
              printf '%s\n' "$output" >&2
              exit 1
            fi
          done

          if [[ -n "$version_digest" && -n "$sha_digest" ]]; then
            if [[ "$version_digest" != "$sha_digest" ]]; then
              echo 'Immutable version and Git SHA tags point to different digests.' >&2
              exit 1
            fi
            echo 'published=true' >> "$GITHUB_OUTPUT"
            echo "digest=$version_digest" >> "$GITHUB_OUTPUT"
          elif [[ -z "$version_digest" && -z "$sha_digest" ]]; then
            echo 'published=false' >> "$GITHUB_OUTPUT"
          else
            echo 'Only one immutable tag exists; refusing an inconsistent publication state.' >&2
            exit 1
          fi
      - name: Generate image metadata
        id: meta
        if: ${{ steps.preflight.outputs.published != 'true' }}
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.IMAGE_NAME }}
          flavor: latest=false
          tags: |
            type=raw,value=${{ needs.prepare.outputs.version }}
            type=sha,prefix=sha-,format=long
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.prepare.outputs.version }}
      - name: Build and publish image
        id: push
        if: ${{ steps.preflight.outputs.published != 'true' }}
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          sbom: true
          provenance: mode=max
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
      - name: Attest published image digest
        if: ${{ always() && steps.preflight.outcome == 'success' && (steps.preflight.outputs.published == 'true' || steps.push.outcome == 'success') }}
        uses: actions/attest@c32b4b8b198b65d0bd9d63490e847ff7b53989d4 # v4.0.0
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest || steps.preflight.outputs.digest }}
          push-to-registry: true
      - name: Record immutable image reference
        if: ${{ steps.push.outcome == 'success' }}
        env:
          IMAGE_DIGEST: ${{ steps.push.outputs.digest }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -Eeuo pipefail
          {
            echo "### ${{ matrix.component }} image"
            echo
            echo "- Version: \`${IMAGE_NAME}:${RELEASE_VERSION}\`"
            echo "- Immutable: \`${IMAGE_NAME}@${IMAGE_DIGEST}\`"
          } >> "$GITHUB_STEP_SUMMARY"
