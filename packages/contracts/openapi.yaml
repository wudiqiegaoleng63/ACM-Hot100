openapi: 3.1.1
info:
  title: ACM Hot 100 API
  version: 1.0.0
  description: |
    Current HTTP contract for the ACM Hot 100 MVP. Authentication uses HttpOnly
    cookies. Every state-changing request must include an Origin header equal to
    the configured application origin.
servers:
  - url: /api/v1
    description: Same-origin API prefix
x-status-policy:
  validation: Current handlers return 400 for malformed and semantically invalid requests; 422 is reserved and is not currently emitted.
tags:
  - name: Health
    description: Service health and public judge mode.
  - name: Auth
    description: Email/password authentication and session lifecycle.
  - name: Problems
    description: Published problems and public metadata.
  - name: Drafts
    description: Per-user source drafts.
  - name: Runs
    description: Asynchronous sample executions.
  - name: Submissions
    description: Formal judge submissions owned by the current user.
  - name: Profile
    description: Current-user training progress.
paths:
  /health:
    get:
      tags: [Health]
      operationId: getHealth
      summary: Check MySQL and Redis health
      security: []
      responses:
        '200':
          description: Required dependencies are available.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'
        '503':
          description: At least one required dependency is unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'
  /auth/register:
    post:
      tags: [Auth]
      operationId: register
      summary: Register an account and send a verification email
      security: []
      parameters:
        - $ref: '#/components/parameters/Origin'
      requestBody:
        $ref: '#/components/requestBodies/Register'
      responses:
        '201':
          $ref: '#/components/responses/MessageCreated'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/Unavailable'
  /auth/verify-email:
    post:
      tags: [Auth]
      operationId: verifyEmail
      summary: Consume an email verification token
      security: []
      parameters:
        - $ref: '#/components/parameters/Origin'
      requestBody:
        $ref: '#/components/requestBodies/Token'
      responses:
        '200':
          description: Email was verified, or the account was already verified.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/Message'
                  - $ref: '#/components/schemas/Error'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
  /auth/resend-verification:
    post:
      tags: [Auth]
      operationId: resendVerification
      summary: Request another verification email without account enumeration
      security: []
      parameters:
        - $ref: '#/components/parameters/Origin'
      requestBody:
        $ref: '#/components/requestBodies/Email'
      responses:
        '200':
          $ref: '#/components/responses/MessageOK'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/Unavailable'
  /auth/login:
    post:
      tags: [Auth]
      operationId: login
      summary: Create access and refresh cookie sessions
      security: []
      parameters:
        - $ref: '#/components/parameters/Origin'
      requestBody:
        $ref: '#/components/requestBodies/Login'
      responses:
        '200':
          description: Login succeeded; both authentication cookies are set.
          headers:
            Set-Cookie:
              $ref: '#/components/headers/AuthCookies'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/Unavailable'
  /auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshSession
      summary: Rotate the refresh cookie and issue a new access cookie
      security:
        - refreshCookie: []
      parameters:
        - $ref: '#/components/parameters/Origin'
      responses:
        '200':
          description: Session cookies were rotated.
          headers:
            Set-Cookie:
              $ref: '#/components/headers/AuthCookies'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/Unavailable'
  /auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      summary: Revoke available session tokens and clear cookies
      security:
        - accessCookie: []
          refreshCookie: []
        - accessCookie: []
        - refreshCookie: []
        - {}
      parameters:
        - $ref: '#/components/parameters/Origin'
      responses:
        '200':
          description: Cookies were cleared.
          headers:
            Set-Cookie:
              $ref: '#/components/headers/ClearedAuthCookies'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '403':
          $ref: '#/components/responses/Forbidden'
  /auth/logout-all:
    post:
      tags: [Auth]
      operationId: logoutAll
      summary: Revoke all current-user sessions and clear cookies
      security:
        - accessCookie: []
      parameters:
        - $ref: '#/components/parameters/Origin'
      responses:
        '200':
          description: All sessions were revoked and cookies were cleared.
          headers:
            Set-Cookie:
              $ref: '#/components/headers/ClearedAuthCookies'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/Unavailable'
  /auth/forgot-password:
    post:
      tags: [Auth]
      operationId: forgotPassword
      summary: Request a reset email without account enumeration
      security: []
      parameters:
        - $ref: '#/components/parameters/Origin'
      requestBody:
        $ref: '#/components/requestBodies/Email'
      responses:
        '200':
          $ref: '#/components/responses/MessageOK'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/Unavailable'
  /auth/reset-password:
    post:
      tags: [Auth]
      operationId: resetPassword
      summary: Consume a reset token and replace the password
      security: []
      parameters:
        - $ref: '#/components/parameters/Origin'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          $ref: '#/components/responses/MessageOK'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
  /auth/me:
    get:
      tags: [Auth]
      operationId: getCurrentUser
      summary: Get the authenticated user
      security:
        - accessCookie: []
      responses:
        '200':
          description: Current user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/Unavailable'
  /problems:
    get:
      tags: [Problems]
      operationId: listProblems
      summary: List and filter published problems
      security:
        - accessCookie: []
        - {}
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: difficulty
          in: query
          schema:
            $ref: '#/components/schemas/Difficulty'
        - name: tag
          in: query
          schema:
            type: string
        - name: state
          in: query
          description: Progress filter applies when a valid access cookie is present.
          schema:
            $ref: '#/components/schemas/ProgressState'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Published problem page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemList'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/Unavailable'
  /problems/{slug}:
    parameters:
      - $ref: '#/components/parameters/ProblemSlug'
    get:
      tags: [Problems]
      operationId: getProblem
      summary: Get a published problem with public sample cases
      security:
        - accessCookie: []
        - {}
      responses:
        '200':
          description: Published problem detail. Hidden test cases and reference solutions are never included.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/Unavailable'
  /problems/{slug}/navigation:
    parameters:
      - $ref: '#/components/parameters/ProblemSlug'
    get:
      tags: [Problems]
      operationId: getProblemNavigation
      summary: Get adjacent published problems
      security:
        - accessCookie: []
        - {}
      responses:
        '200':
          description: Previous and next items when available.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemNavigation'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/Unavailable'
  /problems/{slug}/drafts/{language_key}:
    parameters:
      - $ref: '#/components/parameters/ProblemSlug'
      - $ref: '#/components/parameters/LanguageKey'
    get:
      tags: [Drafts]
      operationId: getDraft
      summary: Get the current user's source draft
      security:
        - accessCookie: []
      responses:
        '200':
          description: Saved draft.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Draft'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/Unavailable'
    put:
      tags: [Drafts]
      operationId: saveDraft
      summary: Save the current user's source draft
      security:
        - accessCookie: []
      parameters:
        - $ref: '#/components/parameters/Origin'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveDraftRequest'
      responses:
        '200':
          description: Saved draft.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Draft'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/Unavailable'
  /problems/{slug}/run:
    parameters:
      - $ref: '#/components/parameters/ProblemSlug'
    post:
      tags: [Runs]
      operationId: createSampleRun
      summary: Queue an asynchronous sample or custom-input run
      security:
        - accessCookie: []
      parameters:
        - $ref: '#/components/parameters/Origin'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSampleRunRequest'
      responses:
        '202':
          description: Sample run was queued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SampleRun'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/Unavailable'
  /runs/{id}:
    parameters:
      - $ref: '#/components/parameters/ResourceID'
    get:
      tags: [Runs]
      operationId: getSampleRun
      summary: Get a sample run owned by the current user
      security:
        - accessCookie: []
      responses:
        '200':
          description: Sample run state and result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SampleRun'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/Unavailable'
  /problems/{slug}/submissions:
    parameters:
      - $ref: '#/components/parameters/ProblemSlug'
    post:
      tags: [Submissions]
      operationId: createSubmission
      summary: Queue a formal judge submission
      security:
        - accessCookie: []
      parameters:
        - $ref: '#/components/parameters/Origin'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSubmissionRequest'
      responses:
        '202':
          description: Submission is persisted and queued or awaiting reconciliation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateSubmissionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/Unavailable'
  /tags:
    get:
      tags: [Problems]
      operationId: listTags
      summary: List public problem tags
      security: []
      responses:
        '200':
          description: Tags.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Tag'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/Unavailable'
  /languages:
    get:
      tags: [Problems]
      operationId: listLanguages
      summary: List enabled language editor configurations
      security: []
      responses:
        '200':
          description: Enabled languages. Judge0 internal IDs are not exposed.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Language'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/Unavailable'
  /submissions:
    get:
      tags: [Submissions]
      operationId: listSubmissions
      summary: List formal submissions owned by the current user
      security:
        - accessCookie: []
      parameters:
        - name: problem
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/SubmissionStatus'
        - name: language
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Current-user submission page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmissionList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/Unavailable'
  /submissions/{id}:
    parameters:
      - $ref: '#/components/parameters/ResourceID'
    get:
      tags: [Submissions]
      operationId: getSubmission
      summary: Get a formal submission owned by the current user
      security:
        - accessCookie: []
      responses:
        '200':
          description: Submission detail. Hidden input and expected output are never returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmissionDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/Unavailable'
  /profile/summary:
    get:
      tags: [Profile]
      operationId: getProfileSummary
      summary: Get current-user progress totals
      security:
        - accessCookie: []
      responses:
        '200':
          description: Progress totals over published problems.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/Unavailable'
  /profile/progress-by-stage:
    get:
      tags: [Profile]
      operationId: getProfileProgressByStage
      summary: Get current-user progress grouped by training stage
      security:
        - accessCookie: []
      responses:
        '200':
          description: Stage progress in training order.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StageProgress'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/Unavailable'
components:
  securitySchemes:
    accessCookie:
      type: apiKey
      in: cookie
      name: access_token
      description: HttpOnly SameSite=Lax access JWT. Secure is required in production.
    refreshCookie:
      type: apiKey
      in: cookie
      name: refresh_token
      description: HttpOnly SameSite=Lax rotating refresh JWT. Secure is required in production.
  parameters:
    Origin:
      name: Origin
      in: header
      required: true
      description: Must exactly match the configured application origin for every state-changing request.
      schema:
        type: string
        format: uri
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    ProblemSlug:
      name: slug
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 80
    LanguageKey:
      name: language_key
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 20
    ResourceID:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  headers:
    AuthCookies:
      description: Two Set-Cookie headers, access_token and refresh_token; HttpOnly, Path=/, SameSite=Lax, and Secure in production.
      schema:
        type: string
    ClearedAuthCookies:
      description: Two Set-Cookie headers clearing access_token and refresh_token with Max-Age=0.
      schema:
        type: string
  requestBodies:
    Register:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RegisterRequest'
    Login:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/LoginRequest'
    Email:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/EmailRequest'
    Token:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TokenRequest'
  responses:
    MessageOK:
      description: Operation completed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Message'
    MessageCreated:
      description: Resource was created.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Message'
    BadRequest:
      description: Malformed or invalid request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Required cookie is missing, invalid, expired, reused, or revoked.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Origin is missing/untrusted, or the authenticated account cannot perform the operation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource was not found or is not owned by the current user.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: Email or username already exists.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    PayloadTooLarge:
      description: Source, custom input, or request body exceeds its limit.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    RateLimited:
      description: Per-endpoint rate limit exceeded.
      headers:
        Retry-After:
          description: Seconds until this request scope may be retried when supplied.
          schema:
            type: integer
            minimum: 0
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalError:
      description: An internal dependency or persistence operation failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unavailable:
      description: Redis, queue, database, or another required dependency is unavailable.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Health:
      type: object
      additionalProperties: false
      required: [status, services, judge_mode]
      properties:
        status:
          const: ok
        services:
          type: object
          additionalProperties: false
          required: [mysql, redis]
          properties:
            mysql:
              type: string
              enum: [ok, error]
            redis:
              type: string
              enum: [ok, error]
        judge_mode:
          type: string
          enum: [mock, judge0]
    ErrorDetail:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code:
          $ref: '#/components/schemas/ErrorCode'
        message:
          type: string
          minLength: 1
        details: {}
    ErrorCode:
      type: string
      enum:
        - ALREADY_VERIFIED
        - BAD_REQUEST
        - CUSTOM_INPUT_TOO_LARGE
        - EMAIL_ALREADY_EXISTS
        - EMAIL_NOT_VERIFIED
        - INTERNAL_ERROR
        - INVALID_CREDENTIALS
        - INVALID_INPUT_SELECTOR
        - INVALID_LANGUAGE
        - INVALID_ORIGIN
        - INVALID_SAMPLE_CASE
        - INVALID_TOKEN
        - MISSING_TOKEN
        - NOT_FOUND
        - QUEUE_UNAVAILABLE
        - RATE_LIMITED
        - RATE_LIMIT_UNAVAILABLE
        - REQUEST_TOO_LARGE
        - SOURCE_CODE_TOO_LARGE
        - TOKEN_EXPIRED
        - TOKEN_REUSE
        - TOKEN_REVOKED
        - UNAUTHORIZED
        - USERNAME_ALREADY_EXISTS
        - USER_NOT_FOUND
        - VALIDATION_ERROR
    Error:
      type: object
      additionalProperties: false
      required: [error, request_id]
      properties:
        error:
          $ref: '#/components/schemas/ErrorDetail'
        request_id:
          type: string
    Message:
