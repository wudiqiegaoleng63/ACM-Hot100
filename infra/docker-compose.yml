services:
  mysql:
    image: mysql:8.0
    container_name: acmhot100-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: acmhot100
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - acmhot100-net

  redis:
    image: redis:7-alpine
    container_name: acmhot100-redis
    command: ["sh", "-c", "exec redis-server --requirepass \"$$REDIS_PASSWORD\""]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-local-redis-password}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - acmhot100-net

  mailpit:
    image: axllent/mailpit:latest
    container_name: acmhot100-mailpit
    ports:
      - "1025:1025"
      - "127.0.0.1:8025:8025"
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8025/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - acmhot100-net

  judge0:
    image: judge0/judge0:latest
    container_name: acmhot100-judge0
    ports:
      - "127.0.0.1:2358:2358"
    environment:
      - RAILS_ENV=production
      - REDIS_URL=redis://redis:6379
      - DATABASE_HOST=mysql
      - DATABASE_PORT=3306
      - DATABASE_USERNAME=root
      - DATABASE_PASSWORD=root
      - DATABASE_NAME=judge0
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    networks:
      - acmhot100-net

networks:
  acmhot100-net:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
